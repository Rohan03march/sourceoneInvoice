<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Invoice Ledger - SourceOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="/SourceOnebg.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .ledger-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .ledger-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
        }

        .ledger-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            padding-left: 2.5rem;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .ledger-table-wrapper {
            overflow-x: auto;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .ledger-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .ledger-table th {
            background: #f8fafc;
            padding: 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--text);
            border-bottom: 2px solid var(--border);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .ledger-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text);
        }

        .ledger-table tr:hover {
            background: #f1f5f9;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #dcfce7;
            color: #166534;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .page-btn {
            background: white;
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--bg);
            border-color: var(--primary);
            color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-content {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            max-width: 650px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            animation: modalSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalSlide {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #fee2e2;
            color: #ef4444;
            transform: rotate(90deg);
        }

        .modal-header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #f8fafc;
            padding-bottom: 1rem;
        }

        .modal-header h2 {
            font-size: 1.75rem;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .modal-header p {
            color: var(--text-light);
            font-weight: 500;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        .info-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .info-group p {
            font-size: 1rem;
            color: var(--text);
            line-height: 1.5;
            font-weight: 500;
        }

        .full-width {
            grid-column: span 2;
        }

        .staff-summary {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .staff-summary h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.25rem;
            color: var(--text-light);
        }

        .staff-list {
            list-style: none;
        }

        .staff-list li {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 0.95rem;
        }

        .staff-list li:last-child {
            border-bottom: none;
            font-weight: 700;
            color: var(--primary);
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            margin-top: 0.5rem;
        }

        .company-link {
            cursor: pointer;
            color: var(--primary);
            font-weight: 600;
            border-bottom: 1px dashed var(--primary);
            display: inline-block;
            transition: all 0.2s;
        }

        .company-link:hover {
            opacity: 0.7;
        }
        .date-filter {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-light);
            margin: 0;
            white-space: nowrap;
        }

        .date-filter input {
            padding: 0.5rem;
            font-size: 0.85rem;
            width: auto;
            min-width: 140px;
        }

        @media (max-width: 768px) {
            .date-filter {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: space-between;
            }
        }
        .download-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .ledger-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .view-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .view-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .delete-btn-ledger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .delete-btn-ledger:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>

<body>
    <div id="app">
        <header class="app-header">
            <div class="header-content">
                <h1>SourceOne <span class="accent">Ledger</span></h1>
            </div>
        </header>

        <main class="ledger-container">
            <a href="/" class="back-link">← Back to Generator</a>
            
            <div class="ledger-card">
                <div class="ledger-header">
                    <div class="search-box">
                        <input type="text" id="ledger-search" placeholder="Search by Invoice No or Company...">
                    </div>
                    <div class="date-filter">
                        <div class="filter-group">
                            <label>From</label>
                            <input type="date" id="ledger-start-date">
                        </div>
                        <div class="filter-group">
                            <label>To</label>
                            <input type="date" id="ledger-end-date">
                        </div>
                    </div>
                    <div class="ledger-actions">
                        <div class="ledger-stats">
                            <span id="total-count">0</span> Invoices Found
                        </div>
                        <button id="download-csv" class="download-btn">
                            📊 Export to Excel
                        </button>
                    </div>
                </div>

                <div class="ledger-table-wrapper">
                    <table class="ledger-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Invoice No</th>
                                <th>Company</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ledger-body">
                            <!-- Data populated by JS -->
                        </tbody>
                    </table>
                </div>

                <div class="pagination">
                    <button id="prev-page" class="page-btn" disabled>Previous</button>
                    <span id="page-info">Page 1</span>
                    <button id="next-page" class="page-btn">Next</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="close-modal">&times;</button>
            <div class="modal-header">
                <h2 id="modal-company-name">-</h2>
                <p id="modal-invoice-no">-</p>
            </div>
            <div class="modal-grid">
                <div class="info-group">
                    <label>Date</label>
                    <p id="modal-date">-</p>
                </div>
                <div class="info-group">
                    <label>GSTIN</label>
                    <p id="modal-gstin">-</p>
                </div>
                <div class="info-group full-width">
                    <label>Address</label>
                    <p id="modal-address">-</p>
                </div>
                <div class="info-group full-width">
                    <div class="staff-summary">
                        <h3>Staff & Charges Breakdown</h3>
                        <ul id="modal-staff-list" class="staff-list">
                            <!-- Populated by JS -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script type="module" src="/src/ledger.js"></script>
</body>

</html>
